<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animal Deaths by Country — Interactive Bubble Chart</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#fafaf8;color:#2c2c2a;padding:24px;max-width:780px;margin:0 auto}
@media(prefers-color-scheme:dark){body{background:#1a1a18;color:#e0ded6}}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:16px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters label{font-size:13px;color:#888}
.filters button{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid #ccc;background:transparent;color:inherit;cursor:pointer;transition:all .15s}
.filters button:hover{background:rgba(0,0,0,.05)}
.filters button.active{border-color:#333;background:rgba(0,0,0,.06);font-weight:500}
@media(prefers-color-scheme:dark){.filters button{border-color:#555}.filters button.active{border-color:#aaa;background:rgba(255,255,255,.08)}.filters button:hover{background:rgba(255,255,255,.06)}}
.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:#888;margin:8px 0 4px}
.legend span{display:flex;align-items:center;gap:4px}
.legend .dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.detail{background:#f0efe8;border-radius:12px;padding:16px 20px;margin-top:12px;animation:fadeIn .2s}
@media(prefers-color-scheme:dark){.detail{background:#2a2a26}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.detail-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.detail-name{font-size:16px;font-weight:500}
.detail-region{font-size:13px;color:#888;margin-left:8px}
.detail-total{font-size:20px;font-weight:500}
.detail-unit{font-size:12px;color:#888;margin-left:4px}
.detail-meta{font-size:12px;color:#888;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-label{font-size:12px;color:#888;width:100px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:16px;background:rgba(0,0,0,.06);border-radius:4px;overflow:hidden}
@media(prefers-color-scheme:dark){.bar-track{background:rgba(255,255,255,.06)}}
.bar-fill{height:100%;border-radius:4px;transition:width .3s}
.bar-val{font-size:12px;font-weight:500;width:50px;flex-shrink:0}
svg text{font-family:inherit}
</style>
</head>
<body>
<h1>Death by animals, by country</h1>
<p class="subtitle">Bubble size &amp; y-axis = deaths per 100k (all animal types). Click a bubble to see the breakdown.</p>
<div class="filters" id="filters"><label>Region:</label></div>
<svg id="chart" width="100%" viewBox="0 0 700 460"></svg>
<div class="legend" id="legend"></div>
<div id="detail" style="display:none"></div>

<script>
const countries=[
{name:"Nigeria",pop:224,region:"Africa",mosquito:82,snake:.7,croc:.15,hippo:.08,large:.05,scorpion:.04},
{name:"DR Congo",pop:102,region:"Africa",mosquito:68,snake:1,croc:.2,hippo:.1,large:.04,scorpion:.02},
{name:"Niger",pop:27,region:"Africa",mosquito:75,snake:.9,croc:.05,hippo:.02,large:.03,scorpion:.15},
{name:"Mozambique",pop:33,region:"Africa",mosquito:55,snake:.8,croc:.18,hippo:.06,large:.03,scorpion:.03},
{name:"Tanzania",pop:66,region:"Africa",mosquito:40,snake:.6,croc:.12,hippo:.07,large:.1,scorpion:.02},
{name:"Uganda",pop:48,region:"Africa",mosquito:45,snake:.5,croc:.08,hippo:.04,large:.06,scorpion:.01},
{name:"Burkina Faso",pop:23,region:"Africa",mosquito:60,snake:1.2,croc:.03,hippo:.01,large:.01,scorpion:.1},
{name:"India",pop:1440,region:"S. Asia",mosquito:.8,snake:4,croc:.02,hippo:0,large:.04,scorpion:.15},
{name:"Pakistan",pop:240,region:"S. Asia",mosquito:.3,snake:1.2,croc:.01,hippo:0,large:.01,scorpion:.2},
{name:"Bangladesh",pop:173,region:"S. Asia",mosquito:.2,snake:.8,croc:.01,hippo:0,large:.01,scorpion:.05},
{name:"Nepal",pop:31,region:"S. Asia",mosquito:.1,snake:1.5,croc:.02,hippo:0,large:.02,scorpion:.08},
{name:"Indonesia",pop:278,region:"SE Asia",mosquito:1.5,snake:.5,croc:.08,hippo:0,large:.01,scorpion:.02},
{name:"Myanmar",pop:55,region:"SE Asia",mosquito:2,snake:1.8,croc:.05,hippo:0,large:.03,scorpion:.03},
{name:"Brazil",pop:216,region:"Americas",mosquito:.3,snake:.15,croc:.01,hippo:0,large:.01,scorpion:.06},
{name:"Colombia",pop:52,region:"Americas",mosquito:.2,snake:.2,croc:.02,hippo:.01,large:.01,scorpion:.04},
{name:"Australia",pop:27,region:"Oceania",mosquito:.01,snake:.08,croc:.04,hippo:0,large:.12,scorpion:0},
{name:"United States",pop:340,region:"Americas",mosquito:.01,snake:.002,croc:0,hippo:0,large:.02,scorpion:.001},
{name:"United Kingdom",pop:68,region:"Europe",mosquito:0,snake:0,croc:0,hippo:0,large:.01,scorpion:0},
{name:"Mexico",pop:130,region:"Americas",mosquito:.05,snake:.12,croc:.01,hippo:0,large:.01,scorpion:.2},
];

const animalTypes=[
{key:"mosquito",label:"Mosquitoes",color:"#E24B4A"},
{key:"snake",label:"Snakes",color:"#BA7517"},
{key:"croc",label:"Crocodiles",color:"#1D9E75"},
{key:"hippo",label:"Hippos",color:"#7F77DD"},
{key:"large",label:"Large mammals",color:"#378ADD"},
{key:"scorpion",label:"Scorpions",color:"#D4537E"},
];

const regionColors={Africa:"#E24B4A","S. Asia":"#BA7517","SE Asia":"#EF9F27",Americas:"#1D9E75",Oceania:"#378ADD",Europe:"#888780"};
const regions=["all","Africa","S. Asia","SE Asia","Americas","Oceania","Europe"];

let filter="all", selected=null;

countries.forEach(c=>{
  c.total=animalTypes.reduce((s,a)=>s+c[a.key],0);
  c.topKiller=animalTypes.reduce((best,a)=>c[a.key]>c[best.key]?a:best,animalTypes[0]);
});

const filtersEl=document.getElementById("filters");
regions.forEach(r=>{
  const b=document.createElement("button");
  b.textContent=r==="all"?"All":r;
  b.className=r==="all"?"active":"";
  b.onclick=()=>{filter=r;selected=null;filtersEl.querySelectorAll("button").forEach(x=>x.className="");b.className="active";draw()};
  filtersEl.appendChild(b);
});

const legEl=document.getElementById("legend");
Object.entries(regionColors).forEach(([r,c])=>{
  legEl.innerHTML+=`<span><span class="dot" style="background:${c}"></span>${r}</span>`;
});
legEl.innerHTML+=`<span style="margin-left:auto;font-style:italic">Bubble size = death rate</span>`;

function draw(){
  const svg=document.getElementById("chart");
  const det=document.getElementById("detail");
  const data=countries.filter(c=>filter==="all"||c.region===filter).sort((a,b)=>b.total-a.total);
  const maxPop=Math.max(...data.map(d=>d.pop));
  const maxT=Math.max(...data.map(d=>d.total));
  const W=700,H=460,p={t:30,r:30,b:60,l:70};
  const cw=W-p.l-p.r,ch=H-p.t-p.b;
  const logMinX=Math.log10(.5),logMaxX=Math.log10(maxPop*1.5);
  const logMinY=Math.log10(.005),logMaxY=Math.log10(maxT*2);
  const xS=v=>p.l+(Math.log10(Math.max(v,.5))-logMinX)/(logMaxX-logMinX)*cw;
  const yS=v=>p.t+ch-(Math.log10(Math.max(v,.005))-logMinY)/(logMaxY-logMinY)*ch;
  const rS=v=>Math.max(6,Math.sqrt(v)*1.8);

  const isDark=matchMedia("(prefers-color-scheme:dark)").matches;
  const tc=isDark?"#aaa":"#888";
  const gc=isDark?"rgba(255,255,255,.08)":"rgba(0,0,0,.06)";
  const pc=isDark?"#e0ded6":"#2c2c2a";

  let s=``;
  [1,10,50,100,500,1500].forEach(v=>{const x=xS(v);if(x>=p.l&&x<=W-p.r){s+=`<line x1="${x}" y1="${p.t}" x2="${x}" y2="${H-p.b}" stroke="${gc}" stroke-width="0.5"/>`;s+=`<text x="${x}" y="${H-p.b+18}" text-anchor="middle" font-size="11" fill="${tc}">${v>=1000?(v/1000)+"B":v+"M"}</text>`}});
  [.01,.1,1,10,100].forEach(v=>{const y=yS(v);if(y>=p.t&&y<=H-p.b){s+=`<line x1="${p.l}" y1="${y}" x2="${W-p.r}" y2="${y}" stroke="${gc}" stroke-width="0.5"/>`;s+=`<text x="${p.l-8}" y="${y+4}" text-anchor="end" font-size="11" fill="${tc}">${v<1?v:Math.round(v)}</text>`}});
  s+=`<text x="${W/2}" y="${H-8}" text-anchor="middle" font-size="12" fill="${tc}" font-weight="500">Population (millions, log scale)</text>`;
  s+=`<text x="14" y="${H/2}" text-anchor="middle" font-size="12" fill="${tc}" font-weight="500" transform="rotate(-90,14,${H/2})">Deaths per 100k (all animals, log)</text>`;

  data.forEach(c=>{
    const cx=xS(c.pop),cy=yS(c.total),r=rS(c.total);
    const sel=selected===c.name;
    s+=`<g class="bubble" data-name="${c.name}" style="cursor:pointer">`;
    s+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${regionColors[c.region]}" opacity="${sel?.95:.7}" stroke="${sel?pc:"none"}" stroke-width="${sel?2:0}"/>`;
    if(r>10||sel) s+=`<text x="${cx}" y="${cy-r-5}" text-anchor="middle" font-size="11" font-weight="500" fill="${pc}">${c.name}</text>`;
    s+=`</g>`;
  });

  svg.innerHTML=s;
  svg.querySelectorAll(".bubble").forEach(g=>{
    g.onclick=()=>{const n=g.dataset.name;selected=selected===n?null:n;draw()};
  });

  if(selected){
    const c=data.find(d=>d.name===selected);
    if(!c){det.style.display="none";return}
    const bars=animalTypes.filter(a=>c[a.key]>0).sort((a,b)=>c[b.key]-c[a.key]);
    const mx=Math.max(...bars.map(a=>c[a.key]));
    let h=`<div class="detail-header"><div><span class="detail-name">${c.name}</span><span class="detail-region">${c.region}</span></div><div><span class="detail-total">${c.total.toFixed(1)}</span><span class="detail-unit">per 100k</span></div></div>`;
    h+=`<div class="detail-meta">Pop: ${c.pop}M · Top killer: ${c.topKiller.label}</div>`;
    bars.forEach(a=>{
      const w=Math.max((c[a.key]/mx)*100,2);
      h+=`<div class="bar-row"><span class="bar-label">${a.label}</span><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${a.color}"></div></div><span class="bar-val">${c[a.key].toFixed(2)}</span></div>`;
    });
    det.innerHTML=h;det.className="detail";det.style.display="block";
  } else {det.style.display="none"}
}

draw();
matchMedia("(prefers-color-scheme:dark)").addEventListener("change",draw);
</script>
</body>
</html>
